<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Euro Detailing — CRM</title>
  <meta name="theme-color" content="#08090c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Euro Detailing" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== Intro ===== -->
  <section id="intro" class="intro">
    <div class="intro__content">
      <div class="intro__logo-wrap"><img src="assets/logo.png" alt="Euro Detailing" class="intro__logo" /><span class="intro__shine"></span></div>
      <p class="intro__tagline">Showroom shine. Every time.</p>
    </div>
    <div class="intro__loader"><div class="intro__loader-bar"></div></div>
  </section>

  <!-- ===== Login ===== -->
  <main id="login" class="login" aria-hidden="true">
    <div class="login__card" id="loginCard">
      <img src="assets/logo.png" alt="Euro Detailing" class="login__logo" />
      <div class="login__title">Euro Detailing</div>
      <p class="login__subtitle">Sign in to your account</p>
      <form id="loginForm">
        <input type="email" id="email" class="login__input login__input--text" placeholder="Email" autocomplete="username" required />
        <input type="password" id="password" class="login__input login__input--text" placeholder="Password" autocomplete="current-password" required />
        <button type="submit" class="btn btn--primary" id="loginBtn">Sign in</button>
      </form>
      <p class="login__error" id="loginError"></p>
    </div>
  </main>

  <!-- ===== App ===== -->
  <div id="app" class="app" aria-hidden="true">
    <!-- Sidebar (desktop) / top bar (phone) -->
    <aside class="sidebar">
      <div class="sidebar__brand"><img src="assets/logo.png" alt="" class="sidebar__logo" /><span>Euro Detailing</span></div>
      <nav class="nav">
        <button class="nav__item is-active" data-view="dashboard"><span class="nav__ico" data-i="dash"></span><span class="nav__lbl">Home</span></button>
        <button class="nav__item" data-view="bookings"><span class="nav__ico" data-i="book"></span><span class="nav__lbl">Bookings</span></button>
        <button class="nav__item" data-view="clients"><span class="nav__ico" data-i="clients"></span><span class="nav__lbl">Clients</span></button>
        <button class="nav__item" data-view="analytics"><span class="nav__ico" data-i="chart"></span><span class="nav__lbl">Stats</span></button>
        <button class="nav__item" data-view="settings"><span class="nav__ico" data-i="gear"></span><span class="nav__lbl">Settings</span></button>
      </nav>
      <button class="sidebar__lock" id="lockBtn">Lock</button>
    </aside>

    <main class="content">
      <!-- Dashboard -->
      <section class="view is-active" id="view-dashboard">
        <div id="dashBody"></div>
      </section>

      <!-- Clients (master-detail) -->
      <section class="view" id="view-clients">
        <div class="cl">
          <div class="cl__list" id="clList">
            <header class="head head--row">
              <h2>Clients</h2>
              <button class="btn btn--primary btn--xs" id="addBtn">+ Add</button>
            </header>
            <input type="search" class="search" id="search" placeholder="Search name, phone, vehicle…" />
            <div class="cards" id="clientCards"></div>
            <div class="empty" id="clientEmpty" hidden>No clients yet. Tap “+ Add”.</div>
          </div>
          <div class="cl__detail" id="clDetail">
            <div class="detail__placeholder" id="detailPlaceholder">Select a client to see details</div>
            <div class="detail" id="detailBody" hidden></div>
          </div>
        </div>
      </section>

      <!-- Bookings -->
      <section class="view" id="view-bookings">
        <header class="head head--row">
          <h2>Bookings</h2>
          <div style="display:flex;gap:.5rem"><button class="btn btn--ghost btn--xs" id="syncBtn">↻</button><button class="btn btn--primary btn--xs" id="addBkBtn">+ Add</button></div>
        </header>
        <div class="seg" id="bkSeg">
          <button class="seg__b is-active" data-seg="upcoming">Upcoming</button>
          <button class="seg__b" data-seg="past">Past</button>
        </div>
        <div id="bkList" class="bklist"></div>
        <div class="empty" id="bkEmpty" hidden>No bookings here yet.</div>
      </section>

      <!-- Analytics -->
      <section class="view" id="view-analytics">
        <div id="analyticsBody"></div>
      </section>

      <!-- Settings -->
      <section class="view" id="view-settings">
        <header class="head"><h2>Settings</h2></header>
        <div id="settingsBody"></div>
      </section>
    </main>
  </div>

  <!-- New booking modal -->
  <div class="modal" id="bkModal" aria-hidden="true">
    <div class="modal__backdrop" data-bkclose></div>
    <form class="modal__card" id="bkForm">
      <h3>New booking</h3>
      <div class="grid2">
        <label class="fld"><span>Name *</span><input id="bkName" required /></label>
        <label class="fld"><span>Phone</span><input id="bkPhone" inputmode="tel" /></label>
        <label class="fld"><span>Service</span><select id="bkService"><option value="interior">Interior</option><option value="exterior">Exterior</option><option value="bundle">Bundle</option></select></label>
        <label class="fld"><span>Tier</span><select id="bkTier"><option value="basic">Basic</option><option value="premium">Premium</option><option value="maintenance">Maintenance</option></select></label>
        <label class="fld"><span>Size</span><select id="bkSize"><option value="sedan">Sedan</option><option value="suv">SUV</option><option value="xl">XL</option></select></label>
        <label class="fld"><span>Vehicle</span><input id="bkVehicle" placeholder="2021 BMW M4" /></label>
        <label class="fld"><span>Date</span><input id="bkDate" type="date" /></label>
        <label class="fld"><span>Time</span><input id="bkTime" type="time" /></label>
      </div>
      <div class="bk-price" id="bkPrice">Price: —</div>
      <div class="modal__actions"><button type="button" class="btn btn--ghost btn--xs" data-bkclose>Cancel</button><button type="submit" class="btn btn--primary btn--xs">Create booking</button></div>
    </form>
  </div>

  <!-- Start Detail (full-screen flow) -->
  <div id="sd" class="sd" aria-hidden="true"><div class="sd__inner" id="sdInner"></div></div>

  <!-- Add / Edit modal -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__backdrop" data-close></div>
    <form class="modal__card" id="clientForm">
      <h3 id="modalTitle">Add client</h3>
      <div class="grid2">
        <label class="fld"><span>Name *</span><input id="fName" required /></label>
        <label class="fld"><span>Phone</span><input id="fPhone" inputmode="tel" /></label>
        <label class="fld"><span>Email</span><input id="fEmail" inputmode="email" /></label>
        <label class="fld"><span>Vehicle</span><input id="fVehicle" placeholder="2021 BMW M4" /></label>
        <label class="fld"><span>Location</span><input id="fLocation" placeholder="City / area" /></label>
        <label class="fld"><span>Last seen</span><input id="fLastSeen" type="date" /></label>
      </div>
      <label class="fld"><span>Notes</span><textarea id="fNotes" rows="2"></textarea></label>
      <div class="fld">
        <span>Photos</span>
        <div class="photoedit" id="photoEdit"></div>
        <label class="photoadd">+ Add photo<input type="file" id="fPhotos" accept="image/*" multiple hidden /></label>
      </div>
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost btn--xs" data-close>Cancel</button>
        <button type="submit" class="btn btn--primary btn--xs">Save</button>
      </div>
    </form>
  </div>

  <script src="config.js"></script>
  <script src="vendor/supabase.js"></script>
  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
    }
  </script>
</body>
</html>
